<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>两天日程表</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F3EE;
    --surface: #FFFFFF;
    --surface2: #EDEAE3;
    --border: #D8D4CC;
    --border-strong: #B8B4AC;
    --text: #1A1916;
    --text-muted: #6B6760;
    --text-faint: #9E9B96;
    --accent: #2D5A3D;
    --accent-light: #E8F0EA;
    --accent-mid: #4A8A60;
    --mono: 'DM Mono', monospace;
    --sans: 'Noto Sans SC', sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141412; --surface: #1E1D1A; --surface2: #272521;
      --border: #333129; --border-strong: #4A4840;
      --text: #F0EDE6; --text-muted: #8A8780; --text-faint: #5A5855;
      --accent: #5BAA74; --accent-light: #1A2E20; --accent-mid: #4A8A60;
    }
  }

  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── 顶栏 ── */
  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 2rem; height: 56px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo {
    font-family: var(--mono); font-size: 13px; font-weight: 500;
    color: var(--text-muted); letter-spacing: .08em; text-transform: uppercase;
  }

  /* ── 同步状态 ── */
  .sync-status {
    display: flex; align-items: center; gap: 6px;
    font-family: var(--mono); font-size: 11px;
    color: var(--text-faint); transition: color .3s;
  }
  .sync-status.syncing { color: #B87A30; }
  .sync-status.synced  { color: var(--accent-mid); }
  .sync-status.error   { color: #c0392b; }
  .sync-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: currentColor; flex-shrink: 0;
  }
  .sync-status.syncing .sync-dot { animation: pulse .8s infinite alternate; }
  @keyframes pulse { to { opacity: .3; } }

  /* ── 按钮 ── */
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .btn {
    height: 32px; padding: 0 14px; border-radius: 6px;
    border: 1px solid var(--border); background: transparent;
    color: var(--text-muted); font-family: var(--sans); font-size: 12px;
    cursor: pointer; display: flex; align-items: center; gap: 6px;
    transition: all .15s; white-space: nowrap;
  }
  .btn:hover { background: var(--surface2); color: var(--text); border-color: var(--border-strong); }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.primary:hover { opacity: .88; }
  .btn.danger:hover  { border-color: #c0392b; color: #c0392b; }
  .btn svg { width: 14px; height: 14px; flex-shrink: 0; }

  /* ── 内容区 ── */
  .main { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  /* ── 加载遮罩 ── */
  .loading-overlay {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; transition: opacity .3s;
  }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .loading-spinner {
    width: 28px; height: 28px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 日期头 ── */
  .day-header-row { display: grid; grid-template-columns: 72px 1fr 1fr; gap: 10px; margin-bottom: 8px; }
  .day-card {
    background: var(--accent-light); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px;
    display: flex; align-items: center; gap: 10px;
  }
  .day-card input {
    background: transparent; border: none; outline: none;
    font-family: var(--sans); font-size: 13px;
    font-weight: 500; color: var(--accent); width: 100%;
  }
  .day-card input::placeholder { color: var(--accent-mid); opacity: .6; }
  .date-input {
    font-family: var(--mono); font-size: 11px;
    color: var(--text-muted); background: transparent;
    border: none; outline: none; width: 90px;
  }

  /* ── 时间槽 ── */
  .time-block { margin-bottom: 3px; }
  .slot-row { display: grid; grid-template-columns: 72px 1fr 1fr; gap: 10px; align-items: stretch; }
  .time-label {
    height: 42px; display: flex; align-items: center;
    justify-content: flex-end; padding-right: 12px;
    font-family: var(--mono); font-size: 11px;
    color: var(--text-faint); user-select: none;
  }
  .time-label.hour-mark { color: var(--text-muted); font-weight: 500; }
  .slot {
    height: 42px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--surface);
    display: flex; align-items: center; padding: 0 12px;
    transition: border-color .15s, background .15s;
  }
  .slot:focus-within { border-color: var(--accent-mid); }
  .slot.has-content  { background: var(--surface2); }
  .slot input {
    background: transparent; border: none; outline: none;
    font-family: var(--sans); font-size: 13px; color: var(--text); width: 100%;
  }
  .slot input::placeholder { color: var(--text-faint); font-size: 12px; }

  /* ── 分段线 ── */
  .period-sep { display: grid; grid-template-columns: 72px 1fr 1fr; gap: 10px; margin: 10px 0 4px; }
  .period-label {
    display: flex; align-items: center; justify-content: flex-end;
    padding-right: 12px; font-family: var(--mono); font-size: 10px;
    color: var(--text-faint); text-transform: uppercase; letter-spacing: .08em;
  }
  .period-line { border-top: 1px solid var(--border); margin-top: 10px; }

  /* ── 摘要 ── */
  .summary-panel {
    margin-top: 2rem; background: var(--surface);
    border: 1px solid var(--border); border-radius: 10px;
    overflow: hidden; display: none;
  }
  .summary-panel.visible { display: block; }
  .summary-header {
    padding: 14px 18px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .summary-title {
    font-family: var(--mono); font-size: 11px; font-weight: 500;
    text-transform: uppercase; letter-spacing: .1em; color: var(--text-muted);
  }
  .summary-body {
    padding: 16px 18px; font-family: var(--mono); font-size: 12px;
    line-height: 2; color: var(--text-muted); white-space: pre-wrap;
    max-height: 400px; overflow-y: auto;
  }
  .copy-feedback { font-size: 11px; color: var(--accent); opacity: 0; transition: opacity .3s; }

  /* ── 最后同步时间 ── */
  .last-sync {
    margin-top: 1.5rem; text-align: right;
    font-family: var(--mono); font-size: 10px; color: var(--text-faint);
  }

  @media (max-width: 600px) {
    header { padding: 0 1rem; }
    .main { padding: 1rem 1rem 4rem; }
    .logo { display: none; }
    .day-header-row, .slot-row, .period-sep { grid-template-columns: 52px 1fr 1fr; }
  }

  @media print {
    header { position: static; }
    .btn, .header-actions, .sync-status, .last-sync, .loading-overlay { display: none; }
  }
</style>
</head>
<body>

<!-- 加载遮罩 -->
<div class="loading-overlay" id="loading-overlay">
  <div class="loading-spinner"></div>
</div>

<header>
  <div class="header-left">
    <span class="logo">Daily Planner</span>
    <div class="sync-status" id="sync-status">
      <div class="sync-dot"></div>
      <span id="sync-text">连接中…</span>
    </div>
  </div>
  <div class="header-actions">
    <button class="btn danger" onclick="clearAll()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/>
      </svg>清空
    </button>
    <button class="btn" onclick="generateSummary()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="5" y="2" width="14" height="20" rx="2"/>
        <line x1="9" y1="7" x2="15" y2="7"/><line x1="9" y1="11" x2="15" y2="11"/>
        <line x1="9" y1="15" x2="13" y2="15"/>
      </svg>生成摘要
    </button>
    <button class="btn primary" onclick="window.print()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="6 9 6 2 18 2 18 9"/>
        <path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2v5a2 2 0 01-2 2h-2"/>
        <rect x="6" y="14" width="12" height="8"/>
      </svg>打印
    </button>
  </div>
</header>

<div class="main">
  <div class="day-header-row">
    <div></div>
    <div class="day-card">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--accent);flex-shrink:0">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <input id="d1name" placeholder="第一天">
      <input class="date-input" id="d1date" placeholder="日期">
    </div>
    <div class="day-card">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--accent);flex-shrink:0">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <input id="d2name" placeholder="第二天">
      <input class="date-input" id="d2date" placeholder="日期">
    </div>
  </div>

  <div id="slots"></div>

  <div class="last-sync" id="last-sync"></div>

  <div class="summary-panel" id="summary-panel">
    <div class="summary-header">
      <span class="summary-title">日程摘要</span>
      <div style="display:flex;align-items:center;gap:12px">
        <span class="copy-feedback" id="copy-feedback">已复制 ✓</span>
        <button class="btn" onclick="copyText()">复制文本</button>
      </div>
    </div>
    <div class="summary-body" id="summary-body"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════
//  常量
// ══════════════════════════════════════════════════
const HOURS = [];
for(let h=6;h<=23;h++) HOURS.push(h);
for(let h=0;h<=5;h++) HOURS.push(h);

const PERIODS = [
  { hour:6, label:'上午' }, { hour:12, label:'下午' },
  { hour:18, label:'晚上' }, { hour:22, label:'深夜' },
  { hour:0,  label:'凌晨' },
];

// ══════════════════════════════════════════════════
//  状态
// ══════════════════════════════════════════════════
let data = emptyData();
let saveTimer = null;
let isSyncing = false;

function emptyData() {
  const d = { d1name:'', d2name:'', d1date:'', d2date:'', slots:{} };
  HOURS.forEach(h => { d.slots[h] = { d1:'', d2:'' }; });
  return d;
}

// ══════════════════════════════════════════════════
//  API 通信
// ══════════════════════════════════════════════════
async function fetchSchedule() {
  const res = await fetch('/api/schedule');
  if (!res.ok) throw new Error('fetch failed');
  return res.json();
}

async function pushSchedule(payload) {
  const res = await fetch('/api/schedule', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });
  if (!res.ok) throw new Error('push failed');
  return res.json();
}

// ══════════════════════════════════════════════════
//  同步状态 UI
// ══════════════════════════════════════════════════
function setSyncStatus(state, detail) {
  const el  = document.getElementById('sync-status');
  const txt = document.getElementById('sync-text');
  el.className = 'sync-status ' + state;
  if (state === 'syncing') txt.textContent = '同步中…';
  else if (state === 'synced') {
    txt.textContent = '已同步';
    const now = new Date().toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
    document.getElementById('last-sync').textContent = `最后同步：${now}`;
  } else if (state === 'error') {
    txt.textContent = detail || '同步失败，将重试';
  } else {
    txt.textContent = '连接中…';
  }
}

// ══════════════════════════════════════════════════
//  防抖保存
// ══════════════════════════════════════════════════
function scheduleSave() {
  setSyncStatus('syncing');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try {
      await pushSchedule(data);
      setSyncStatus('synced');
    } catch(e) {
      setSyncStatus('error');
      console.error('Save error:', e);
    }
  }, 500);
}

// ══════════════════════════════════════════════════
//  渲染
// ══════════════════════════════════════════════════
function fmt(h) { return String(h).padStart(2,'0') + ':00'; }

function applyDataToDOM() {
  document.getElementById('d1name').value = data.d1name || '';
  document.getElementById('d2name').value = data.d2name || '';
  document.getElementById('d1date').value = data.d1date || '';
  document.getElementById('d2date').value = data.d2date || '';
}

function render() {
  applyDataToDOM();

  ['d1name','d2name','d1date','d2date'].forEach(id => {
    document.getElementById(id).addEventListener('input', e => {
      data[id] = e.target.value;
      scheduleSave();
    });
  });

  const c = document.getElementById('slots');
  c.innerHTML = '';

  HOURS.forEach((h, i) => {
    const period = PERIODS.find(p => p.hour === h);
    if (period && i > 0) {
      const sep = document.createElement('div');
      sep.className = 'period-sep';
      sep.innerHTML = `
        <div class="period-label">${period.label}</div>
        <div class="period-line"></div>
        <div class="period-line"></div>
      `;
      c.appendChild(sep);
    }

    const row = document.createElement('div');
    row.className = 'slot-row time-block';

    const tl = document.createElement('div');
    tl.className = 'time-label hour-mark';
    tl.textContent = fmt(h);
    row.appendChild(tl);

    ['d1','d2'].forEach(day => {
      const wrap = document.createElement('div');
      const val  = (data.slots[h] || {})[day] || '';
      wrap.className = 'slot' + (val ? ' has-content' : '');

      const inp = document.createElement('input');
      inp.type = 'text';
      inp.placeholder = '添加事项…';
      inp.value = val;
      inp.addEventListener('input', e => {
        if (!data.slots[h]) data.slots[h] = {};
        data.slots[h][day] = e.target.value;
        wrap.classList.toggle('has-content', !!e.target.value);
        scheduleSave();
      });

      wrap.appendChild(inp);
      row.appendChild(wrap);
    });

    c.appendChild(row);
  });
}

// ══════════════════════════════════════════════════
//  清空
// ══════════════════════════════════════════════════
async function clearAll() {
  if (!confirm('确定清空所有内容？（所有设备上的数据都将清除）')) return;
  data = emptyData();
  document.getElementById('summary-panel').classList.remove('visible');
  applyDataToDOM();
  // 清空输入框
  document.querySelectorAll('.slot input').forEach(inp => {
    inp.value = '';
    inp.closest('.slot').classList.remove('has-content');
  });
  try {
    await pushSchedule(data);
    setSyncStatus('synced');
  } catch(e) {
    setSyncStatus('error');
  }
}

// ══════════════════════════════════════════════════
//  摘要
// ══════════════════════════════════════════════════
function generateSummary() {
  const d1 = data.d1name || '第一天';
  const d2 = data.d2name || '第二天';
  const s1 = data.d1date ? ' · ' + data.d1date : '';
  const s2 = data.d2date ? ' · ' + data.d2date : '';

  let text = `【${d1}${s1}】\n`;
  let c1 = 0;
  HOURS.forEach(h => {
    const v = (data.slots[h] || {}).d1;
    if (v) { text += `  ${fmt(h)}  ${v}\n`; c1++; }
  });
  if (!c1) text += '  （暂无安排）\n';

  text += `\n【${d2}${s2}】\n`;
  let c2 = 0;
  HOURS.forEach(h => {
    const v = (data.slots[h] || {}).d2;
    if (v) { text += `  ${fmt(h)}  ${v}\n`; c2++; }
  });
  if (!c2) text += '  （暂无安排）\n';

  text += `\n共 ${c1+c2} 项安排（${d1} ${c1} 项 / ${d2} ${c2} 项）`;

  document.getElementById('summary-body').textContent = text;
  const panel = document.getElementById('summary-panel');
  panel.classList.add('visible');
  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function copyText() {
  const text = document.getElementById('summary-body').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const fb = document.getElementById('copy-feedback');
    fb.style.opacity = '1';
    setTimeout(() => { fb.style.opacity = '0'; }, 2000);
  });
}

// ══════════════════════════════════════════════════
//  初始化
// ══════════════════════════════════════════════════
(async () => {
  try {
    const result = await fetchSchedule();
    if (result.data && Object.keys(result.data).length > 0) {
      // 补全缺失小时（兼容旧数据）
      data = { ...emptyData(), ...result.data };
      HOURS.forEach(h => {
        if (!data.slots[h]) data.slots[h] = { d1:'', d2:'' };
      });
    }
    render();
    setSyncStatus('synced');
  } catch(e) {
    console.error('Init failed:', e);
    render();
    setSyncStatus('error', '无法连接服务器');
  } finally {
    const overlay = document.getElementById('loading-overlay');
    overlay.classList.add('hidden');
    setTimeout(() => overlay.remove(), 400);
  }
})();
</script>
</body>
</html>
