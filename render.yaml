services:
  - type: web
    name: daily-planner
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: BACKUP_DIR
        value: /opt/render/project/src/data/backups
      - key: NODE_ENV
        value: production
