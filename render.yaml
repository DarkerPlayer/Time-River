services:
  - type: web
    name: daily-planner
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: DB_DIR
        value: /data
      - key: NODE_ENV
        value: production
    disk:
      name: planner-db
      mountPath: /data
      sizeGB: 1
